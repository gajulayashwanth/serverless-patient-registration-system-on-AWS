<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MAD Multi-Speciality Hospital</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #12263f;
    --teal: #0891b2;
    --teal-light: #06b6d4;
    --gold: #f59e0b;
    --gold-light: #fcd34d;
    --cream: #fafaf7;
    --slate: #64748b;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    color: #e2e8f0;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(8,145,178,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 80%, rgba(245,158,11,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(18,38,63,0.5) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; padding: 32px 16px 60px; }

  /* ─── HEADER ─── */
  .header {
    position: relative;
    background: linear-gradient(135deg, var(--navy-mid) 0%, rgba(8,145,178,0.25) 100%);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 48px 40px 40px;
    text-align: center;
    margin-bottom: 32px;
    overflow: hidden;
    backdrop-filter: blur(12px);
  }

  .header::before {
    content: '✦';
    position: absolute;
    top: 20px; left: 36px;
    font-size: 11px;
    color: var(--gold-light);
    opacity: 0.7;
    letter-spacing: 8px;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--teal-light), transparent);
  }

  .header-badge {
    display: inline-block;
    background: rgba(8,145,178,0.2);
    border: 1px solid rgba(8,145,178,0.4);
    color: var(--teal-light);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 18px;
    border-radius: 100px;
    margin-bottom: 18px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 900;
    color: #f8fafc;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .header h1 span {
    background: linear-gradient(90deg, var(--teal-light), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: rgba(226,232,240,0.65);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* ─── FORM SECTION ─── */
  .form-section {
    background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px 36px;
    margin-bottom: 28px;
    backdrop-filter: blur(10px);
  }

  .form-title {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 32px;
    position: relative;
    padding-bottom: 16px;
  }
  .form-title::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 50px; height: 2px;
    background: linear-gradient(90deg, var(--teal), var(--gold));
    border-radius: 2px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(148,163,184,0.9);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
    text-align: center;
  }

  .form-control,
  .form-select {
    background: rgba(255,255,255,0.06) !important;
    border: 1px solid rgba(255,255,255,0.10) !important;
    border-radius: 12px !important;
    padding: 14px 18px !important;
    color: #f1f5f9 !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: 14px !important;
    transition: all 0.25s ease !important;
  }

  .form-control::placeholder { color: rgba(148,163,184,0.45) !important; }

  .form-control:focus,
  .form-select:focus {
    background: rgba(8,145,178,0.10) !important;
    border-color: rgba(8,145,178,0.55) !important;
    box-shadow: 0 0 0 3px rgba(8,145,178,0.15) !important;
    outline: none !important;
    color: #f8fafc !important;
  }

  .form-select option { background: var(--navy-mid); color: #f1f5f9; }

  .center-input { width: 68%; max-width: 400px; }
  @media (max-width: 768px) { .center-input { width: 92%; } }

  /* ─── BUTTONS ─── */
  .btn-save {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    color: white;
    padding: 14px 32px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(8,145,178,0.35);
  }
  .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(8,145,178,0.5);
    color: white;
  }

  .btn-update {
    background: linear-gradient(135deg, #059669 0%, #10b981 100%);
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    color: white;
    padding: 14px 32px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(16,185,129,0.3);
  }
  .btn-update:hover { transform: translateY(-2px); color: white; box-shadow: 0 8px 28px rgba(16,185,129,0.45); }

  .btn-reset {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18) !important;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    color: rgba(203,213,225,0.8) !important;
    padding: 14px 32px;
    transition: all 0.25s ease;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.06) !important; border-color: rgba(255,255,255,0.3) !important; transform: translateY(-1px); }

  /* ─── RECORDS SECTION ─── */
  .records-section {
    background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 32px;
    backdrop-filter: blur(10px);
  }

  .records-section h5 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #f1f5f9;
    margin: 0;
  }

  #searchBox { width: 220px !important; }

  .btn-outline-secondary {
    background: transparent !important;
    border: 1px solid rgba(255,255,255,0.18) !important;
    color: rgba(203,213,225,0.8) !important;
    border-radius: 10px !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    padding: 9px 18px !important;
    transition: all 0.2s ease !important;
    white-space: nowrap;
  }
  .btn-outline-secondary:hover {
    background: rgba(8,145,178,0.15) !important;
    border-color: rgba(8,145,178,0.5) !important;
    color: var(--teal-light) !important;
  }

  /* ─── TABLE ─── */
  .table-responsive { border-radius: 16px; overflow: hidden; }

  .table { margin: 0; border-collapse: separate; border-spacing: 0; }

  .table thead tr th {
    background: rgba(8,145,178,0.2);
    color: rgba(186,230,253,0.9);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 16px;
    border: none;
    border-bottom: 1px solid rgba(8,145,178,0.3);
  }

  .table tbody tr td {
    background: transparent;
    color: rgba(226,232,240,0.85);
    font-size: 13px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    vertical-align: middle;
  }

  .table tbody tr:last-child td { border-bottom: none; }

  .table tbody tr:hover td {
    background: rgba(8,145,178,0.08);
    color: #f1f5f9;
  }

  /* ─── ANIMATIONS ─── */
  .header, .form-section, .records-section {
    animation: fadeUp 0.5s ease both;
  }
  .form-section { animation-delay: 0.1s; }
  .records-section { animation-delay: 0.2s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: rgba(8,145,178,0.4); border-radius: 3px; }
</style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-badge">Est. 2024 · Excellence in Care</div>
    <h1>MAD Multi-Speciality <span>Hospital</span></h1>
    <p>Patient Registration Portal</p>
  </div>

  <!-- Patient Registration -->
  <div class="form-section">
    <div class="form-title">Patient Registration Form</div>

    <div class="row g-4 justify-content-center">

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Patient ID</label>
        <input id="patient_id" class="form-control center-input" placeholder="Enter Patient ID">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Full Name</label>
        <input id="full_name" class="form-control center-input" placeholder="Enter Full Name">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Age</label>
        <input id="age" type="number" class="form-control center-input" placeholder="Enter Age">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Gender</label>
        <select id="gender" class="form-select center-input">
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Contact Number</label>
        <input
          id="contact_no"
          type="tel"
          class="form-control center-input"
          placeholder="10-digit mobile number"
          maxlength="10"
          pattern="[0-9]{10}">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Department</label>
        <input id="department" class="form-control center-input" placeholder="e.g. Cardiology">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Doctor Assigned</label>
        <input id="doctor_assigned" class="form-control center-input" placeholder="Doctor Name">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Visit Date</label>
        <input id="date" type="date" class="form-control center-input">
      </div>

    </div>

    <div class="mt-5 d-flex justify-content-center gap-3 flex-wrap">
      <button id="savepatient" class="btn btn-save">Save Patient</button>
      <button id="updatepatient" class="btn btn-update d-none">Update Patient</button>
      <button id="resetform" class="btn btn-reset">Reset</button>
    </div>
  </div>

  <!-- Patient Records -->
  <div class="records-section">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
      <h5 class="fw-bold">Patient Records</h5>
      <div class="d-flex gap-2">
        <input id="searchBox" class="form-control" placeholder="Search patient">
        <button id="searchBtn" class="btn btn-outline-secondary">Search</button>
        <button id="getpatients" class="btn btn-outline-secondary">View All</button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle" id="PatientTable">
        <thead>
          <tr>
            <th>Patient ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Contact</th>
            <th>Department</th>
            <th>Doctor</th>
            <th>Date</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="scripts.js"></script>
</body>
</html>
