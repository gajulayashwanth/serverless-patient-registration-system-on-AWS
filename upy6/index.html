<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MAD Multi-Speciality Hospital</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #e0f2fe, #fdf2f8);
    padding: 24px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #2563eb, #9333ea);
    color: white;
    padding: 36px;
    border-radius: 28px;
    text-align: center;
    margin-bottom: 35px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.25);
  }

  .header h1 {
    font-weight: 900;
    letter-spacing: .5px;
    margin-bottom: 6px;
  }

  .header p {
    margin: 0;
    opacity: 0.95;
    font-size: 15px;
  }

  /* Form Section */
  .form-section {
    background: linear-gradient(135deg, #ffffff, #f8fafc);
    border-radius: 30px;
    padding: 36px;
    margin-bottom: 40px;
    box-shadow: 0 25px 55px rgba(0,0,0,0.12);
  }

  .form-title {
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 30px;
    color: #0f172a;
  }

  label {
    font-size: 13px;
    font-weight: 700;
    color: #64748b;
    margin-bottom: 6px;
    text-align: center;
  }

  /* Borderless inputs */
  .form-control,
  .form-select {
    border: none !important;
    border-radius: 14px;
    padding: 14px 16px;
    background: #f1f5f9;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
  }

  .form-control:focus,
  .form-select:focus {
    outline: none;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.05),
                0 0 0 3px rgba(99,102,241,.35);
    background: #ffffff;
  }

  /* Centered uniform width */
  .center-input {
    width: 70%;
    max-width: 420px;
  }

  @media (max-width: 768px) {
    .center-input {
      width: 90%;
    }
  }

  /* Buttons */
  .btn-save {
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    border: none;
    border-radius: 18px;
    font-weight: 800;
    color: white;
    padding: 14px 36px;
  }

  .btn-update {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    border: none;
    border-radius: 18px;
    font-weight: 800;
    color: white;
    padding: 14px 36px;
  }

  .btn-reset {
    border-radius: 18px;
    font-weight: 700;
    padding: 14px 36px;
  }

  /* Records */
  .records-section {
    background: white;
    border-radius: 30px;
    padding: 30px;
    box-shadow: 0 22px 50px rgba(0,0,0,0.1);
  }

  table thead {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
  }

  table tbody tr:hover {
    background: #f1f5f9;
  }
</style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>MAD Multi-Speciality Hospital</h1>
    <p>Patient Registration Portal</p>
  </div>

  <!-- Patient Registration -->
  <div class="form-section">
    <div class="form-title">Patient Registration Form</div>

    <div class="row g-4 justify-content-center">

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Patient ID</label>
        <input id="patient_id" class="form-control center-input" placeholder="Enter Patient ID">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Full Name</label>
        <input id="full_name" class="form-control center-input" placeholder="Enter Full Name">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Age</label>
        <input id="age" type="number" class="form-control center-input" placeholder="Enter Age">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Gender</label>
        <select id="gender" class="form-select center-input">
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Contact Number</label>
        <input
          id="contact_no"
          type="tel"
          class="form-control center-input"
          placeholder="10-digit mobile number"
          maxlength="10"
          pattern="[0-9]{10}">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Department</label>
        <input id="department" class="form-control center-input" placeholder="e.g. Cardiology">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Doctor Assigned</label>
        <input id="doctor_assigned" class="form-control center-input" placeholder="Doctor Name">
      </div>

      <div class="col-12 d-flex flex-column align-items-center">
        <label>Visit Date</label>
        <input id="date" type="date" class="form-control center-input">
      </div>

    </div>

    <div class="mt-5 d-flex justify-content-center gap-3 flex-wrap">
      <button id="savepatient" class="btn btn-save">Save Patient</button>
      <button id="updatepatient" class="btn btn-update d-none">Update Patient</button>
      <button id="resetform" class="btn btn-outline-secondary btn-reset">Reset</button>
    </div>
  </div>

  <!-- Patient Records -->
  <div class="records-section">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold">Patient Records</h5>
      <div class="d-flex gap-2">
        <input id="searchBox" class="form-control" placeholder="Search patient">
        <button id="searchBtn" class="btn btn-outline-secondary">Search</button>
        <button id="getpatients" class="btn btn-outline-secondary">View All</button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle" id="PatientTable">
        <thead>
          <tr>
            <th>Patient ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Contact</th>
            <th>Department</th>
            <th>Doctor</th>
            <th>Date</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="scripts.js"></script>
</body>
</html>
